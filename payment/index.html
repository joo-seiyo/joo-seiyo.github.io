<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>付款通道指引</title>

  <style>
    :root {
      --primary: #4a6cf7;
      --primary-light: #6c8dff;
      --dark: #0f172a;
      --gray: #64748b;
      --light-bg: #f8fafc;
      --border: #edf2f7;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      --card-bg: rgba(255, 255, 255, 0.92);
      --green: #16a34a;
      --red: #dc2626;
      --text-dark: #0b1a33;
      --text-muted: #94a3b8;
      --highlight-bg: #fef9e7;
      --highlight-text: #b45309;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: radial-gradient(circle at top left, #eef4ff, #f7f9fc 45%, #ffffff);
      min-height: 100vh;
      color: #1a2332;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .page.active {
      display: block;
    }

    .home-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 950px;
      margin: auto;
      background: var(--card-bg);
      border-radius: 32px;
      padding: 42px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .08);
      border: 1px solid rgba(255, 255, 255, .9);
      backdrop-filter: blur(10px);
    }

    .home-card {
      max-width: 560px;
      text-align: center;
    }

    .logo {
      display: block;
      max-width: 160px;
      height: auto;
      margin: 0 auto 18px;
      object-fit: contain;
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-dark);
    }

    .subtitle {
      color: var(--gray);
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .menu-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      margin: 12px 0;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: .25s;
    }

    .menu-btn:hover {
      transform: translateY(-4px);
    }

    .btn-public {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 12px 30px rgba(74, 108, 247, .25);
    }

    .btn-private {
      background: linear-gradient(135deg, var(--dark), #334155);
      color: white;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .25);
    }

    .back-btn {
      border: none;
      background: var(--dark);
      color: white;
      padding: 12px 22px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .info-box {
      background: var(--light-bg);
      border-left: 4px solid var(--primary);
      border-radius: 18px;
      padding: 20px;
      margin: 24px 0;
    }

    .info-box p {
      line-height: 1.9;
      color: #334155;
    }

    .highlight {
      background: var(--highlight-bg);
      padding: 2px 8px;
      border-radius: 8px;
      color: var(--highlight-text);
      font-weight: 600;
    }

    .info-row {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: .2s;
      outline: none;
    }

    .info-row:focus-visible {
      box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.4);
    }

    .info-row:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .label {
      color: var(--gray);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 16px;
      font-weight: 600;
      word-break: break-all;
    }

    .copy-tip {
      color: var(--primary);
      font-size: 13px;
      margin-top: 12px;
    }

    .qr-box {
      margin: 30px auto 20px;
      max-width: 320px;
      text-align: center;
    }

    .qr-image {
      background: white;
      border: 2px dashed #dce2ef;
      border-radius: 20px;
      padding: 10px;
      display: inline-block;
    }

    .qr-image img {
      display: block;
      width: 100%;
      max-width: 200px;
      height: auto;
      border-radius: 12px;
      margin: 0 auto;
    }

    .qr-label {
      margin-top: 12px;
      color: var(--gray);
      font-size: 14px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      border: none;
      padding: 15px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: .25s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-blue {
      background: var(--primary);
      color: white;
    }

    .btn-green {
      background: var(--green);
      color: white;
    }

    .footer-note {
      margin-top: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      line-height: 1.7;
    }

    .footer-note span {
      background: #f1f5f9;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .card {
        padding: 24px;
      }
      .action-row {
        flex-direction: column;
      }
      .title {
        font-size: 28px;
      }
      .qr-image img {
        max-width: 220px;
      }
    }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- 首页 -->
  <div id="homePage" class="page active">
    <main class="home-page">
      <div class="card home-card">
        <img id="logoImg" class="logo" alt="公司Logo" src="">
        <div id="logoPlaceholder" style="display:none; max-width:160px; margin:0 auto 18px; background:#f1f5f9; border-radius:12px; padding:20px; text-align:center; color:#94a3b8; font-size:12px;">Logo</div>

        <h1 class="title">付款通道指引</h1>
        <p class="subtitle" id="homeSubtitle"></p>

        <div id="homeButtons"></div>
      </div>
    </main>
  </div>

  <!-- 对公付款页 -->
  <div id="publicPage" class="page">
    <div class="card">
      <button type="button" class="back-btn" onclick="App.pageManager.show('homePage')">← 返回首页</button>

      <div class="badge">🔹 对公账户</div>
      <h2 class="section-title">对公付款信息</h2>
      <p class="subtitle">
        请使用以下账户信息进行付款或转账。<br>
        付款前请仔细核对收款账户信息。
      </p>

      <div id="publicInfoContainer"></div>

      <div class="copy-tip">📋 点击任意卡片即可复制</div>

      <div class="action-row">
        <button type="button" class="btn btn-blue" onclick="App.copyAllInfo()">复制全部信息</button>
        <button type="button" class="btn btn-green" onclick="App.downloadPublicWord()">下载 Word（仅限PC）</button>
      </div>

      <div class="footer-note">
        <span>🔒 本页面仅用于展示对公付款信息</span><br>
        所有付款以实际到账为准 · <span id="footerSite1"></span>
      </div>
    </div>
  </div>

  <!-- 个人付款页 -->
  <div id="privatePage" class="page">
    <div class="card">
      <button type="button" class="back-btn" onclick="App.pageManager.show('homePage')">← 返回首页</button>

      <div class="badge">🔹 个人账户</div>
      <h2 class="section-title">个人付款信息</h2>
      <p class="subtitle">
        请使用微信扫描下方二维码完成付款。<br>
        付款时请备注 公司+姓名，便于核对。
      </p>

      <div class="info-box">
        <p>
          <strong>📌 付款注意事项</strong><br>
          · 付款时请务必备注 <span class="highlight">公司+姓名</span>，以便核对<br>
          · 金额以双方确认的对账单为准<br>
          · 如有疑问，请先联系确认，避免重复付款
        </p>
      </div>

      <div class="qr-box">
        <div class="qr-image">
          <img id="qrCodeImg" src="" alt="收款二维码">
          <div id="qrPlaceholder" style="display:none; padding:30px; color:#94a3b8; background:#f8fafc; border-radius:12px; max-width:200px; margin:0 auto;">二维码图片加载失败</div>
        </div>
        <div class="qr-label">👆 收款二维码</div>
      </div>

      <div class="footer-note">
        <span>🔒 本页面仅用于展示收款码</span><br>
        所有付款以实际到账为准 · <span id="footerSite2"></span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ==================== 配置模块 ====================
      const CONFIG = {
        site: {
          footer: 'xujingyao@cmp.com.cn',
        },
        resources: {
          logo: './logo.png',
          qrCode: './we.png',
        },
        payment: {
          public: {
            company: '中涂化工（上海）有限公司',
            taxId: '91310000607295634U',
            address: '上海市嘉定区嘉松北路4677号',
            phone: '021-59501000',
            bank: '中国农业银行股份有限公司上海安亭支行',
            account: '038084-08015000433'
          },
          infoItems: [
            { label: '公司全称', key: 'company' },
            { label: '纳税人识别号', key: 'taxId' },
            { label: '注册地址', key: 'address' },
            { label: '联系电话', key: 'phone' },
            { label: '开户银行', key: 'bank' },
            { label: '对公账号', key: 'account' }
          ]
        },
        home: {
          subtitle: '请选择付款方式<br>系统将展示对应付款信息',
          buttons: [
            { text: '🏦 对公付款信息', pageId: 'publicPage', className: 'btn-public' },
            { text: '💳 个人付款信息', pageId: 'privatePage', className: 'btn-private' }
          ]
        }
      };

      // ==================== 工具模块 ====================
      const Utils = {
        toastTimer: null,
        showToast(message, duration = 2000) {
          const toast = document.getElementById('toast');
          toast.textContent = message;
          toast.classList.add('show');
          clearTimeout(this.toastTimer);
          this.toastTimer = setTimeout(() => {
            toast.classList.remove('show');
          }, duration);
        },
        copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text)
              .then(() => Utils.showToast('✅ 已复制'))
              .catch(() => Utils.fallbackCopy(text));
          } else {
            Utils.fallbackCopy(text);
          }
        },
        fallbackCopy(text) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            Utils.showToast('✅ 已复制');
          } catch (e) {
            Utils.showToast('❌ 复制失败，请手动复制');
          }
          document.body.removeChild(textarea);
        },
        createElement(tag, props = {}, ...children) {
          const el = document.createElement(tag);
          Object.entries(props).forEach(([key, value]) => {
            if (key === 'className') el.className = value;
            else if (key === 'textContent') el.textContent = value;
            else if (key.startsWith('on')) el.addEventListener(key.slice(2).toLowerCase(), value);
            else el.setAttribute(key, value);
          });
          children.forEach(child => {
            if (typeof child === 'string') el.appendChild(document.createTextNode(child));
            else if (child instanceof Node) el.appendChild(child);
          });
          return el;
        }
      };

      // ==================== 页面管理器 ====================
      class PageManager {
        constructor() {
          this.currentPage = null;
          this.pages = new Map();
        }
        register(pageId, initFn) {
          this.pages.set(pageId, { initFn, initialized: false });
        }
        show(pageId) {
          const page = this.pages.get(pageId);
          if (!page) return;

          document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

          if (!page.initialized && page.initFn) {
            page.initFn();
            page.initialized = true;
          }

          const target = document.getElementById(pageId);
          if (target) {
            target.classList.add('active');
            this.currentPage = pageId;
          }
        }
      }

      // ==================== 应用主模块 ====================
      const App = {
        pageManager: new PageManager(),

        init() {
          this.setFooterText();
          this.initHomePage();
          this.initPublicPageRegistration();
          this.initPrivatePageRegistration();
          this.pageManager.show('homePage');
        },

        setFooterText() {
          document.getElementById('footerSite1').textContent = CONFIG.site.footer;
          document.getElementById('footerSite2').textContent = CONFIG.site.footer;
        },

        initHomePage() {
          this.pageManager.register('homePage', null);

          const logoImg = document.getElementById('logoImg');
          const logoPlaceholder = document.getElementById('logoPlaceholder');
          logoImg.src = CONFIG.resources.logo;
          logoImg.onerror = () => {
            logoImg.style.display = 'none';
            logoPlaceholder.style.display = 'block';
          };
          logoImg.onload = () => {
            logoPlaceholder.style.display = 'none';
          };

          document.getElementById('homeSubtitle').innerHTML = CONFIG.home.subtitle;

          const btnContainer = document.getElementById('homeButtons');
          btnContainer.innerHTML = '';
          CONFIG.home.buttons.forEach(btn => {
            const button = Utils.createElement('button', {
              type: 'button',
              className: `menu-btn ${btn.className}`,
              textContent: btn.text,
              onClick: () => this.pageManager.show(btn.pageId)
            });
            btnContainer.appendChild(button);
          });
        },

        initPublicPageRegistration() {
          this.pageManager.register('publicPage', () => {
            const container = document.getElementById('publicInfoContainer');
            container.innerHTML = '';
            CONFIG.payment.infoItems.forEach(item => {
              const value = CONFIG.payment.public[item.key];
              const row = Utils.createElement('div', {
                className: 'info-row',
                role: 'button',
                tabindex: '0',
                'aria-label': `复制${item.label}：${value}`
              });
              const labelDiv = Utils.createElement('div', { className: 'label', textContent: item.label });
              const valueDiv = Utils.createElement('div', { className: 'value', textContent: value });
              row.appendChild(labelDiv);
              row.appendChild(valueDiv);
              row.addEventListener('click', () => Utils.copyText(value));
              row.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                  e.preventDefault();
                  Utils.copyText(value);
                }
              });
              container.appendChild(row);
            });
          });
        },

        initPrivatePageRegistration() {
          this.pageManager.register('privatePage', () => {
            const qrImg = document.getElementById('qrCodeImg');
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            qrImg.src = CONFIG.resources.qrCode;
            qrImg.onerror = () => {
              qrImg.style.display = 'none';
              qrPlaceholder.style.display = 'block';
            };
            qrImg.onload = () => {
              qrPlaceholder.style.display = 'none';
            };
          });
        },

        copyAllInfo() {
          const allInfo = CONFIG.payment.infoItems
            .map(item => `${item.label}：${CONFIG.payment.public[item.key]}`)
            .join('\n');
          Utils.copyText(allInfo);
        },

        downloadPublicWord() {
          const infoLines = CONFIG.payment.infoItems
            .map(item => `<p>${item.label}：${CONFIG.payment.public[item.key]}</p>`)
            .join('\n');

          const htmlContent = `
            <html>
            <head><meta charset="UTF-8"><title>对公付款信息</title></head>
            <body style="font-family:Microsoft YaHei;padding:40px;">
              <h2>对公付款信息</h2>
              ${infoLines}
            </body>
            </html>
          `;

          const blob = new Blob(['\uFEFF' + htmlContent], { type: 'application/msword;charset=utf-8' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = '对公付款信息.doc';
          link.click();
          URL.revokeObjectURL(link.href);
          Utils.showToast('Word 已生成，建议用 Office 打开');
        }
      };

      // 启动应用
      document.addEventListener('DOMContentLoaded', () => App.init());

      window.App = App;
    })();
  </script>
</body>
</html>
